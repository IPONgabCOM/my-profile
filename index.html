<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Dynamic Favicon Link -->
    <link rel="icon" id="dynamic-favicon" type="image/png" href="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;" onkeydown="return disableInspect(event)">

    <div id="overlay" onclick="enterSite()">
        <div class="click-text">c l i c k</div>
    </div>

    <div class="background-container">
        <!-- Replace with your GIF URL -->

        <source src="Gat Putch - Halik Sobrang Diin PT.2 (feat. Louie Grammz & Mi'Kel).mp3" type="audio/mpeg">
    </audio>

    <div class="main-content">
        <div class="profile-card">
            
            <div class="avatar-container">
                <!-- Discord Hover Card (The Top Bar) -->
                <div class="discord-card">
                    <div class="card-header">
                        <img id="card-avatar" src="" alt="">
                        <div id="card-status-dot-small" class="status-dot-small"></div>
                    </div>
                    <div class="card-body">
                        <h2 id="card-name">...</h2>
                        <p id="card-username">@username</p>
                        <div class="card-separator"></div>
                        <div class="card-note" id="note-section" style="display: none;">
                            <span class="note-label">NOTES</span>
                            <p id="discord-note"></p> 
                        </div>
                    </div>
                </div>

                <!-- Main Avatar & Decoration -->
                <img id="discord-decoration" class="avatar-decoration" src="" style="display: none;">
                <img id="discord-avatar" class="avatar" src="https://via.placeholder.com/150">
                <div id="status-dot" class="status-dot offline"></div>
            </div>

            <h1 id="display-name">Monsy</h1>
            
            <div class="now-playing">
                <i class="fas fa-music"></i> <span id="song-display">Halik Sobrang Diin PT.2</span>
            </div>

            <div class="socials">

                Views: <span id="view-count">0</span>
            </div>
        </div>

    <script src="script.js"></script>
